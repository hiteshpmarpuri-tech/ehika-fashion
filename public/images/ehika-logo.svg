<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6d6db" />
      <stop offset="100%" stop-color="#f1cfcf" />
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#CBA135" />
      <stop offset="100%" stop-color="#b6862a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer round badge -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="600" r="520" fill="url(#bgGrad)" />
    <circle cx="600" cy="600" r="520" fill="none" stroke="url(#rimGrad)" stroke-width="28" />
  </g>

  <!-- Mannequin inside arch -->
  <g transform="translate(0, -20)">
    <!-- arch -->
    <path d="M420 360 a180 180 0 0 1 360 0 v300 h-360 z" fill="none" stroke="#d8b26a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

    <!-- mannequin silhouette -->
    <g transform="translate(520,360)">
      <path d="M-40 40 C -60 10 -40 -60 0 -90 C 40 -60 60 10 40 40 C 10 30 -10 30 -40 40 Z" fill="#111" />
    </g>

    <!-- sash wrapping -->n
    <path d="M480 520 C 540 480 660 480 720 520 C 660 540 540 540 480 520 Z" fill="#b97b82" opacity="0.95" />

    <!-- leaves -->
    <path d="M740 300 C760 290 800 290 820 310" stroke="#b97b82" stroke-width="6" fill="none" stroke-linecap="round" />
    <ellipse cx="840" cy="290" rx="18" ry="30" fill="#d7a76d" />
    <ellipse cx="820" cy="310" rx="18" ry="28" fill="#b97b82" />
  </g>

  <!-- Brand text -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" text-anchor="middle">
    <text x="600" y="820" font-size="160" fill="#111">EHIKA</text>
    <text x="600" y="940" font-size="56" fill="#7a4a4a" letter-spacing="8">FASHION</text>
  </g>
</svg>
